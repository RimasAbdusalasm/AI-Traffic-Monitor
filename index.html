
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Traffic Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body{
            margin:0;
            padding:0;
            background:#0f172a;
            color:white;
            font-family:Arial;
        }

        .container{
            width:90%;
            margin:auto;
            padding:20px;
        }

        h1{
            text-align:center;
            color:#00ffcc;
            margin-bottom:30px;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
            gap:20px;
        }

        .card{
            background:#1e293b;
            padding:20px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 0 15px rgba(0,255,200,0.2);
        }

        .card h2{
            margin:0;
            font-size:20px;
            color:#00ffcc;
        }

        .card p{
            font-size:35px;
            margin-top:10px;
        }

        .upload-box{
            margin-top:40px;
            text-align:center;
        }

        input{
            padding:10px;
        }

        button{
            padding:12px 25px;
            border:none;
            border-radius:10px;
            background:#00ffcc;
            cursor:pointer;
            font-size:16px;
            margin-left:10px;
        }

        .result{
            margin-top:40px;
            text-align:center;
        }

        img{
            width:75%;
            border-radius:20px;
            border:4px solid #00ffcc;
            margin-top:20px;
        }

        .status{
            margin-top:20px;
            font-size:25px;
            color:#00ffcc;
        }

        .time{
            margin-top:10px;
            color:#ccc;
        }

        .chart-container{
            width:60%;
            margin:40px auto;
            background:#1e293b;
            padding:20px;
            border-radius:20px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>AI Traffic Monitoring Dashboard</h1>

        <div class="cards">

            <div class="card">
                <h2>Total Vehicles</h2>
                <p>{{ total }}</p>
            </div>

            <div class="card">
                <h2>Cars</h2>
                <p>{{ cars }}</p>
            </div>

            <div class="card">
                <h2>Trucks</h2>
                <p>{{ trucks }}</p>
            </div>

            <div class="card">
                <h2>Buses</h2>
                <p>{{ buses }}</p>
            </div>

            <div class="card">
                <h2>Motorcycles</h2>
                <p>{{ motorcycles }}</p>
            </div>

        </div>

        <div class="upload-box">

            <form method="POST" enctype="multipart/form-data">

                <input type="file" name="image" required>

                <button type="submit">
                    Analyze Traffic
                </button>

            </form>

        </div>

        {% if image %}

        <div class="result">

            <div class="status">
                Traffic Status: {{ status }}
            </div>

            <div class="time">
                Analysis Time: {{ time }}
            </div>

            <img src="{{ url_for('static', filename=image) }}">

        </div>

        <div class="chart-container">

            <canvas id="trafficChart"></canvas>

        </div>

        {% endif %}

    </div>

<script>

const ctx = document.getElementById('trafficChart');

new Chart(ctx, {

    type: 'bar',

    data: {

        labels: ['Cars', 'Trucks', 'Buses', 'Motorcycles'],

        datasets: [{

            label: 'Vehicle Count',

            data: [
                {{ cars }},
                {{ trucks }},
                {{ buses }},
                {{ motorcycles }}
            ],

            borderWidth: 1

        }]
    },

    options: {

        responsive: true,

        scales: {

            y: {
                beginAtZero: true
            }
        }
    }
});

</script>

</body>
</html>
